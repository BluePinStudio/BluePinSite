<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jam Creativity Brainstormer</title>
    <style>
      :root {
        --bg: #1e1e2e;
        --surface: #313244;
        --text: #cdd6f4;
        --accent: #89b4fa;
        --accent-hover: #b4befe;
        --border: #45475a;
        --success: #a6e3a1;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        padding: 20px;
        max-width: 800px;
        margin: auto;
        line-height: 1.6;
      }

      h1, h2, h3 {
        color: var(--accent);
        margin-top: 0;
      }

      .panel {
        background-color: var(--surface);
        padding: 25px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid var(--border);
      }

      label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
        color: var(--accent);
      }

      input[type="text"],
      textarea {
        width: 100%;
        padding: 12px;
        background-color: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        box-sizing: border-box;
        font-family: inherit;
        resize: vertical;
      }
      
      input[type="text"]:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
      }

      button {
        background-color: var(--accent);
        color: var(--bg);
        border: none;
        padding: 12px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition: background-color 0.2s ease;
      }

      button:hover:not(:disabled) {
        background-color: var(--accent-hover);
      }

      button:disabled {
        background-color: var(--border);
        color: #7f849c;
        cursor: not-allowed;
      }

      .flex-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .timer-controls {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      #timerDisplay {
        font-size: 2.5rem;
        font-weight: bold;
        font-family: monospace;
        color: var(--success);
      }

      .progress-container {
        width: 100%;
        height: 8px;
        background-color: var(--bg);
        border-radius: 4px;
        margin-bottom: 25px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background-color: var(--success);
        width: 100%;
        transition: width 1s linear;
      }

      .prompt-display {
        font-size: 1.15rem;
        background: var(--bg);
        padding: 20px;
        border-radius: 6px;
        border: 2px dashed var(--border);
        margin-top: 15px;
      }
      
      .tag {
        display: inline-block;
        background: var(--surface);
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.9rem;
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <h1>Jam Creativity Brainstormer</h1>

    <div class="panel">
      <div class="flex-header">
        <h3>1. The Constraints</h3>
        <button id="rollBtn" onclick="generatePrompt()" disabled>Loading Data...</button>
      </div>
      
      <div id="promptArea" class="prompt-display" style="display: none">
        <strong>Theme <span class="tag" id="themeSource"></span> :</strong>
        <span id="promptTheme" style="color: var(--success); font-weight: bold;"></span><br /><br />
        <strong>Genre:</strong> <span id="promptGenre"></span><br /><br />
        <strong>Constraint:</strong> <span id="promptConstraint"></span>
      </div>
    </div>

    <div class="panel">
      <div class="flex-header">
        <h3>2. Snackable Concept Canvas</h3>
        <div class="timer-controls">
          <div id="timerDisplay">05:00</div>
          <button onclick="resetTimer()" style="padding: 8px 12px; font-size: 0.9rem;">Reset</button>
        </div>
      </div>
      
      <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <label for="gameTitle">Project Title</label>
      <input type="text" id="gameTitle" placeholder="Untitled Prototype" />

      <label for="elevatorPitch">Elevator Pitch (One sentence)</label>
      <textarea
        id="elevatorPitch"
        rows="2"
        placeholder="A virtual pet simulator where..."
      ></textarea>

      <label for="snackableLoop">The 30-Second Loop</label>
      <textarea
        id="snackableLoop"
        rows="3"
        placeholder="What snackable action does the player do right away? (e.g., Click to clean the screen, wait 5 seconds, collect a coin)"
      ></textarea>

      <label for="gameVibe">Aesthetic & Vibe</label>
      <textarea
        id="gameVibe"
        rows="2"
        placeholder="Y2K aesthetics, fake retro handheld console, limited 4-color palette, chunky pixel art..."
      ></textarea>

      <button
        onclick="sendToDiscord()"
        style="width: 100%; padding: 15px; margin-top: 20px; font-size: 1.1rem"
      >
        Archive to Discord
      </button>
    </div>

    <script>
      // ==========================================
      // CONFIGURATION
      // ==========================================
      const WEBHOOK_URL = "https://discord.com/api/webhooks/1499467073133350995/TV7vY69D2RfoGvFs0WdyuyvOmRqZZUovq4pQhbtTI049Qpr_VpihJupTX0nzYr02pNun"; // PASTE YOUR DISCORD WEBHOOK HERE
      
      const MAX_TIME = 300; // 5 minutes in seconds
      let timerInterval;
      let timeLeft = MAX_TIME; 

      let appData = {
        ldThemes: [],
        gmtkThemes: [],
        ggjThemes: [],
        genres: [],
        constraints: []
      };

      // Load data from root JSON files on page load
      async function loadJSONFiles() {
        try {
          const [ld, gmtk, ggj, genres, constraints] = await Promise.all([
            fetch('ldThemes.json').then(r => r.json()),
            fetch('gmtkThemes.json').then(r => r.json()),
            fetch('ggjThemes.json').then(r => r.json()),
            fetch('genres.json').then(r => r.json()),
            fetch('constraints.json').then(r => r.json())
          ]);

          appData.ldThemes = ld;
          appData.gmtkThemes = gmtk;
          appData.ggjThemes = ggj;
          appData.genres = genres;
          appData.constraints = constraints;

          const rollBtn = document.getElementById("rollBtn");
          rollBtn.disabled = false;
          rollBtn.innerText = "Roll New Challenge";
        } catch (error) {
          console.error("Error loading JSON files.", error);
          document.getElementById("rollBtn").innerText = "Error: JSON not found";
        }
      }

      window.onload = loadJSONFiles;

      function getRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function generatePrompt() {
        const sources = [
          { name: "Ludum Dare", themes: appData.ldThemes },
          { name: "GMTK", themes: appData.gmtkThemes },
          { name: "Global Game Jam", themes: appData.ggjThemes },
        ];

        const pickedSource = getRandom(sources);
        
        document.getElementById("themeSource").innerText = pickedSource.name;
        document.getElementById("promptTheme").innerText = getRandom(pickedSource.themes);
        document.getElementById("promptGenre").innerText = getRandom(appData.genres);
        document.getElementById("promptConstraint").innerText = getRandom(appData.constraints);
        
        document.getElementById("promptArea").style.display = "block";

        resetTimer();
        startTimer();
      }

      function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, "0");
        const s = (timeLeft % 60).toString().padStart(2, "0");
        const display = document.getElementById("timerDisplay");
        
        display.innerText = `${m}:${s}`;

        if (timeLeft <= 60) {
            display.style.color = "#f38ba8"; // Turn red in last minute
        } else {
            display.style.color = "var(--success)";
        }

        const percentage = (timeLeft / MAX_TIME) * 100;
        const bar = document.getElementById("progressBar");
        bar.style.width = percentage + "%";
        
        if (timeLeft <= 60) {
            bar.style.backgroundColor = "#f38ba8";
        } else {
            bar.style.backgroundColor = "var(--success)";
        }
      }

      function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          if (timeLeft > 0) {
            timeLeft--;
            updateTimerDisplay();
          } else {
            clearInterval(timerInterval);
            // Notifications intentionally omitted per preference. Relying on visual UI update.
            document.getElementById("timerDisplay").innerText = "00:00";
          }
        }, 1000);
      }

      function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = MAX_TIME;
        updateTimerDisplay();
      }

      async function sendToDiscord() {
        if (!WEBHOOK_URL) {
          alert("Please paste your Discord Webhook URL into the WEBHOOK_URL variable at the top of the script.");
          return;
        }

        const themeSource = document.getElementById("themeSource").innerText;
        const theme = document.getElementById("promptTheme").innerText;
        const genre = document.getElementById("promptGenre").innerText;
        const constraint = document.getElementById("promptConstraint").innerText;

        const title = document.getElementById("gameTitle").value.trim() || "Untitled Concept";
        const pitch = document.getElementById("elevatorPitch").value.trim() || "No pitch provided.";
        const loop = document.getElementById("snackableLoop").value.trim() || "No loop specified.";
        const vibe = document.getElementById("gameVibe").value.trim() || "No aesthetic specified.";

        if (!theme) {
          alert("Please roll a challenge first.");
          return;
        }

        const payload = {
          embeds: [
            {
              title: `🕹️ Concept Archive: ${title}`,
              color: 8959226, 
              fields: [
                {
                  name: "The Constraints",
                  value: `**Theme (${themeSource}):** ${theme}\n**Genre:** ${genre}\n**Constraint:** ${constraint}`,
                  inline: false,
                },
                {
                  name: "Elevator Pitch",
                  value: pitch,
                  inline: false,
                },
                {
                  name: "30-Second Snackable Loop",
                  value: loop,
                  inline: false,
                },
                {
                  name: "Aesthetic & Vibe",
                  value: vibe,
                  inline: false,
                },
              ],
              timestamp: new Date().toISOString(),
            },
          ],
        };

        try {
          const response = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (response.ok) {
            alert("Concept archived to Discord!");
            document.getElementById("gameTitle").value = "";
            document.getElementById("elevatorPitch").value = "";
            document.getElementById("snackableLoop").value = "";
            document.getElementById("gameVibe").value = "";
            resetTimer();
          } else {
            alert("Failed to send webhook. Verify the URL is correct.");
          }
        } catch (error) {
          console.error("Webhook Error:", error);
          alert("Network error sending webhook.");
        }
      }
    </script>
  </body>
</html>
